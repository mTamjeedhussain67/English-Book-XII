<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bookGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="pageGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
  </defs>
  <!-- Book cover -->
  <rect x="6" y="6" width="28" height="36" rx="3" ry="3" fill="url(#bookGrad)"/>
  <!-- Book spine -->
  <rect x="6" y="6" width="4" height="36" rx="2" ry="2" fill="#4338ca"/>
  <!-- Book pages -->
  <rect x="10" y="9" width="21" height="30" rx="1" fill="url(#pageGrad)"/>
  <!-- Text lines on page -->
  <rect x="13" y="13" width="15" height="2" rx="1" fill="#a5b4fc"/>
  <rect x="13" y="17" width="12" height="2" rx="1" fill="#a5b4fc"/>
  <rect x="13" y="21" width="14" height="2" rx="1" fill="#a5b4fc"/>
  <rect x="13" y="25" width="10" height="2" rx="1" fill="#a5b4fc"/>
  <!-- Pen / pencil overlapping top-right -->
  <rect x="30" y="4" width="5" height="22" rx="2" ry="2" fill="#f59e0b" transform="rotate(35 33 15)"/>
  <polygon points="41,28 36,24 38,31" fill="#fbbf24"/>
  <rect x="30" y="4" width="5" height="4" rx="1" fill="#9ca3af" transform="rotate(35 33 15)"/>
  <rect x="30" y="6" width="5" height="2" rx="0" fill="#d97706" transform="rotate(35 33 15)"/>
</svg>